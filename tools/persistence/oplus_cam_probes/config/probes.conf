# oplus_cam_probes — opt-in probe set (doc-50, decision: opt-in resident set).
# Format:  <target_process>  <bundle>  <mode>
#   target_process : exact process name (matched via `pidof`)
#   bundle         : agent/<bundle>.js  (built by build_bundle.sh from bundle.manifest)
#   mode           : resident = inject once when the daemon appears
#                    app      = re-inject on every fresh app pid (spawn-gate via poll)
# DEFAULT = FACILITATION-ONLY (empty resident set). 2026-06-15: the module's job is to FACILITATE hooks
# (frida-inject) + blob swap — NOT to auto-run a heavy probe set at boot. The `app` bundle bundles the
# freeze/EDR/preview probes; injecting them resident at every boot (a) instruments the daily-driver camera
# continuously, and (b) DOUBLE-instruments during a host-frida capture (resident + capture attach the same
# hot-path hooks) — which is what stalled the freeze-gateb capture and froze the preview. No single probe
# freezes alone (verified by step-through), but the aggregate-at-boot + capture overlap does.
#
# So: NOTHING is resident by default. Captures attach probes on-demand via host frida (baseline.sh /
# app_probe_capture.sh) — proven to work (golden full-baseline). The module stays installed as the
# facilitation + blob-patch layer. To OPT IN to a resident set for a bench session (NOT during a capture),
# uncomment a line below; keep it to LIGHT observe-only probes, never the preview-hot-path set.
#
# Format:  <target_process>  <bundle>  <mode>   (resident = inject once when daemon appears; app = per fresh app pid)
# cameraserver                            server     resident   # opt-in (bench only) — server probes
# com.oplus.camera                        app        app        # opt-in (bench only) — HEAVY app bundle; freezes under capture overlap
# vendor.qti.camera.provider-service_64   provider   resident   # opt-in: CamX/CHI provider levers (heavier)
